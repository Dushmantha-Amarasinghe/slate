name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      # Golden (pixel-snapshot) tests are excluded here: their baseline
      # images were recorded on Windows, and font anti-aliasing differs
      # just enough on Linux runners to fail an exact pixel match even
      # when nothing is actually visually broken. They still run locally
      # and are a real regression check there — just not portable across
      # OSes without a matching renderer, so they're not part of this gate.
      - run: flutter test test/unit test/widget test/migration test/widget_test.dart
