android.builtInKotlin=false
# Kotlin's incremental compiler cache crashes on Windows when the project
# path contains a space ("Todo List") — it can't compute a relative path
# between the plugin's pub-cache source root and the build dir. Disabling
# incremental compilation avoids that relativization entirely; it costs a
# slightly slower Kotlin recompile, not correctness.
kotlin.incremental=false
